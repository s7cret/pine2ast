name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dev dependencies
        run: python -m pip install -U pip && python -m pip install -e .[dev]
      - name: Ruff lint
        run: python -m ruff check .
      - name: Black format check
        run: python -m black --check .
      - name: Tests with coverage
        run: python -m pytest --cov=pine2ast --cov-report=term-missing --cov-report=xml
      - name: Mypy advisory baseline
        continue-on-error: true
        run: python -m mypy pine2ast
      - name: Release quality wrapper
        run: python tools/run_quality_gate.py --strict-dev-tools --json QUALITY_GATE_LOCAL_CI.json
      - name: Upload reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pine2ast-quality-${{ matrix.python-version }}
          path: |
            coverage.xml
            QUALITY_GATE_LOCAL_CI.json
            QUALITY_GATE_CI.json
            BUILTIN_COVERAGE_CI.json
